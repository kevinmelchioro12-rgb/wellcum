name: VelociTAI CI

on:
  push:
    paths:
      - "velocitai/**"
      - ".github/workflows/velocitai-ci.yml"
  pull_request:
    paths:
      - "velocitai/**"
      - ".github/workflows/velocitai-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    defaults:
      run:
        working-directory: velocitai
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install optional config dependency (PyYAML)
        run: pip install PyYAML
      - name: Byte-compile (sanity)
        run: python -m compileall velocitai
      - name: Run test suite (stdlib only)
        run: python -m unittest discover -s tests -v
      - name: Smoke-test demo
        run: python -m velocitai demo --config config/default.yaml
